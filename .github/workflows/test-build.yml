name: Test Build

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test-build:
    name: Test wheel build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          args: --release --out dist
          sccache: 'true'
          manylinux: auto
          working-directory: packages/colcon-cargo-ros2

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: test-wheel-${{ matrix.os }}
          path: packages/colcon-cargo-ros2/dist/*.whl
          retention-days: 7

      - name: Install and test wheel
        shell: bash
        run: |
          python -m pip install packages/colcon-cargo-ros2/dist/*.whl
          python -c "import colcon_cargo_ros2; print(f'Successfully imported colcon_cargo_ros2')"
