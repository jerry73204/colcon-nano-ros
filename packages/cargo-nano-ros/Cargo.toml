[package]
name = "cargo-nano-ros"
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Standalone build tool for nano-ros: generate message bindings from package.xml"
homepage.workspace = true
documentation.workspace = true
readme = "README.md"
keywords = ["ros2", "cargo", "subcommand", "codegen", "embedded"]
categories = ["development-tools::cargo-plugins", "development-tools::build-utils", "command-line-utilities"]

[lib]
name = "cargo_nano_ros"
path = "src/lib.rs"

[[bin]]
name = "cargo-nano-ros"
path = "src/main.rs"

[[bin]]
name = "nano-ros"
path = "src/standalone.rs"

[dependencies]
clap = { version = "4.5", features = ["derive"] }
eyre = "0.6"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
cargo_metadata = "0.18"
toml = "0.8"
sha2 = "0.10"
rosidl-bindgen = { path = "../rosidl-bindgen" }
rosidl-codegen = { path = "../rosidl-codegen" }
rosidl-parser = { path = "../rosidl-parser" }
rayon = "1.10"
indicatif = "0.17"
quick-xml = "0.37"

[dev-dependencies]
tempfile = "3.8"
