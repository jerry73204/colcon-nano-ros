version = 1
system = "demo_system"

[target]
triple = "x86_64-unknown-linux-gnu"
board = "native"
rmw = "zenoh"

[[manifests]]
package = "demo_nodes_rs"
path = "share/demo_nodes_rs/nros-manifest.json"

[[components]]
package = "demo_nodes_rs"
component = "talker"
config = "components/talker/nros.toml"

[[components]]
package = "demo_nodes_rs"
component = "listener"
config = "components/listener/nros.toml"

[[overlays]]
namespace = "/demo"

[overlays.selector]
package = "demo_nodes_rs"
executable = "talker"
instance = "talker_1"

[overlays.parameters]
rate_hz = 20

[[overlays.remaps]]
from = "chatter"
to = "/demo/chatter"

[overlays.scheduling]
context = "default_executor"
priority = 5

[[scheduling.contexts]]
id = "default_executor"
executor = "single_threaded"
class = "real_time"
priority = 5
period_ms = 100
budget_ms = 20
deadline_ms = 100
deadline_policy = "warn"
stack_size = 16384
core = 0
task = "nros-default"

[[endpoint_mappings]]
instance = "talker_1"
manifest_endpoint = "manifest://demo_nodes_rs/talker/pub_chatter"
source_entity = "pub_chatter"
reason = "disambiguate generated talker endpoint"

[build]
profile = "release"
features = ["rmw-zenoh"]
