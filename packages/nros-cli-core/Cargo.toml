[package]
name = "nros-cli-core"
version.workspace = true
authors.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Library backing the `nros` CLI: subcommand dispatch + shared logic, used by both the `nros` standalone binary and the `cargo nano-ros` shim."
homepage.workspace = true
documentation.workspace = true
readme = "README.md"
keywords = ["ros2", "cli", "scaffold", "codegen", "embedded"]
categories = ["command-line-utilities", "development-tools::build-utils"]

[lib]
name = "nros_cli_core"
path = "src/lib.rs"

[features]
default = []
# Maintainer-only release subcommands (`nros release detect|publish|tag`).
# Hidden from `nros --help` unless this feature is on at build time.
release = []

[dependencies]
clap = { workspace = true }
eyre = "0.6"
serde = { workspace = true }
serde_json = { workspace = true }
toml = { workspace = true }
toml_edit = "0.22"
cargo_metadata = "0.18"

# Reuse generate-{rust,c,cpp} surface from cargo-nano-ros — avoids
# re-implementing codegen and keeps `nros generate` byte-for-byte
# identical to `cargo nano-ros generate-*`.
cargo-nano-ros = { workspace = true }
