[workspace]
resolver = "2"
members = [
    "rosidl-parser",
    "rosidl-codegen",
    "rosidl-bindgen",
    "cargo-ros2",
    "colcon-cargo-ros2",
]

[workspace.package]
version = "0.2.0"
authors = []
edition = "2021"
license = "MIT OR Apache-2.0"
repository = "https://github.com/azewiusz/colcon-cargo-ros2"

[workspace.dependencies]
# Shared dependencies across workspace members
anyhow = "1.0"
askama = "0.12"
thiserror = "1.0"
clap = { version = "4.5", features = ["derive"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
toml = "0.8"

# PyO3 for Python bindings
pyo3 = { version = "0.22", features = ["extension-module"] }

# Workspace member dependencies
cargo-ros2 = { path = "cargo-ros2" }
rosidl-bindgen = { path = "rosidl-bindgen" }
rosidl-parser = { path = "rosidl-parser" }
rosidl-codegen = { path = "rosidl-codegen" }

[profile.dev-release]
inherits = "release"
debug = true
strip = false
